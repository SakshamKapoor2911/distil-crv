# Phase 2: LoRA Verifier (SECONDARY)

experiment_name: "distil-crv-lora-v1"
verifier:
  type: "lora"
  lora_r: 8
  lora_alpha: 16
  lora_dropout: 0.1
  target_modules: ["q_proj", "v_proj"]
  n_error_types: 5

training:
  batch_size: 8  # Smaller due to LoRA adding params
  epochs: 20
  learning_rate: 5e-5
  warmup_steps: 300
  gradient_clip: 1.0

data:
  dataset: "gsm8k"
  split: "train"
  layer_indices: [24, 25, 26, 27, 28, 29, 30, 31]
  max_seq_len: 2048

logging:
  wandb_project: "distil-crv"
  wandb_tags: ["phase2", "lora", "secondary"]
