# Phase 2: Transformer Verifier (PRIMARY)

experiment_name: "distil-crv-transformer-v1"
verifier:
  type: "transformer"
  hidden_dim: 4096  # Llama-3.1-8B
  verifier_dim: 512
  n_layers: 4
  n_heads: 8
  ff_dim: 2048
  dropout: 0.1
  n_error_types: 5

training:
  batch_size: 16
  epochs: 20
  learning_rate: 1e-4
  warmup_steps: 500
  gradient_clip: 1.0
  
  loss:
    type: "distillation"
    temperature: 3.0
    alpha_soft: 0.7  # Soft target weight
    alpha_hard: 0.3  # Hard label weight

data:
  dataset: "gsm8k"
  split: "train"
  layer_indices: [24, 25, 26, 27, 28, 29, 30, 31]  # Top 8 layers of Llama
  max_seq_len: 2048

evaluation:
  val_every_n_steps: 500
  save_best_checkpoint: true

logging:
  wandb_project: "distil-crv"
  wandb_tags: ["phase2", "transformer", "primary"]
